<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LeadBaseAI</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-muted: #747da1;
            --accent: #00b4ff;
            --accent-glow: rgba(0, 180, 255, 0.3);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --text: #0f172a;
                --text-muted: #64748b;
                --accent: #0070f3;
                --accent-glow: rgba(0, 112, 243, 0.1);
                --card-bg: #ffffff;
                --border: rgba(0, 0, 0, 0.05);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            max-width: 600px;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            animation: pulse 4s infinite ease-in-out;
        }

        h1 {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
            animation: float 6s infinite ease-in-out;
        }

        h2 {
            font-family: 'Urbanist', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.9rem 2rem;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px var(--accent-glow);
            filter: brightness(1.1);
        }

        /* Ambient particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .dot {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        @keyframes particleFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>
    <div class="glow"></div>
    
    <div class="container">
        <h1 id="error-code">404</h1>
        <h2>Oops! This page took a wrong turn.</h2>
        <p>The link you followed might be broken, or the page may have been moved into the AI-automated future.</p>
        <a href="/" class="btn">
            Return to Home
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14m-7-7 7 7-7 7"/>
            </svg>
        </a>
    </div>

    <script>
        // Generate subtle floating particles
        const container = document.getElementById('particle-container');
        const count = 30;

        for (let i = 0; i < count; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            
            const size = Math.random() * 3 + 1;
            const posX = Math.random() * 100;
            const posY = Math.random() * 100;
            const delay = Math.random() * 10;
            const duration = Math.random() * 10 + 10;

            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${posX}%`;
            dot.style.top = `${posY}%`;
            dot.style.animation = `particleFloat ${duration}s ${delay}s infinite linear`;
            
            container.appendChild(dot);
        }

        // Subtle mouse interaction
        document.addEventListener('mousemove', (e) => {
            const h1 = document.getElementById('error-code');
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            h1.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
